version: 1
project: compat
env:
  PROJECT: global
tasks:
  database:
    command: db
    args: ["--data", "path with space"]
    env:
      COMMON: shared
    success_exit_codes: [0, 130]
    restart: on-failure
    restart_delay_ms: 750
    max_restarts: 4
    restart_reset_after_ms: 9000
    shutdown_timeout_ms: 3000
  api:
    command: api
    args: ["--port", "8080"]
    env:
      COMMON: shared
      LOCAL: api
    success_exit_codes: [0, 130]
    depends_on:
      database:
        condition: started
    restart: on-failure
    restart_delay_ms: 750
    max_restarts: 4
    restart_reset_after_ms: 9000
    shutdown_timeout_ms: 3000
