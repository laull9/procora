name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: 要创建或更新的 Release 标签，例如 v0.3.0
        required: true
        type: string

permissions:
  actions: read
  contents: read

env:
  RELEASE_TAG: ${{ github.event_name == 'push' && github.ref_name || inputs.tag }}
  RELEASE_REF: ${{ github.event_name == 'push' && github.ref || inputs.tag }}

jobs:
  prepare:
    name: 校验发布标签
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          ref: ${{ env.RELEASE_REF }}
      - name: 校验标签与包版本
        shell: bash
        run: |
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+(\.[0-9]+)?(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "发布标签格式无效：$RELEASE_TAG" >&2
            exit 1
          fi

          if ! git show-ref --verify --quiet "refs/tags/$RELEASE_TAG"; then
            echo "远端不存在发布标签：$RELEASE_TAG" >&2
            exit 1
          fi

          manifest_version=$(sed -n 's/^version = "\([^"]*\)"/\1/p' Cargo.toml | head -n 1)
          tag_version=${RELEASE_TAG#v}
          if [[ "$tag_version" =~ ^[0-9]+\.[0-9]+$ ]]; then
            tag_version="$tag_version.0"
          elif [[ "$tag_version" =~ ^([0-9]+\.[0-9]+)(-.+)$ ]]; then
            tag_version="${BASH_REMATCH[1]}.0${BASH_REMATCH[2]}"
          fi

          if [[ "$tag_version" != "$manifest_version" ]]; then
            echo "标签版本 $tag_version 与 Cargo.toml 版本 $manifest_version 不一致" >&2
            exit 1
          fi
      - name: 校验标签位于已通过 CI 的 main 提交
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          git fetch origin main
          release_commit=$(git rev-list -n 1 "$RELEASE_TAG")
          main_commit=$(git rev-parse origin/main)
          if [[ "$release_commit" != "$main_commit" ]]; then
            echo "发布标签必须指向 main 最新提交" >&2
            exit 1
          fi

          ci_conclusion=$(gh run list \
            --repo "$GITHUB_REPOSITORY" \
            --workflow ci.yml \
            --branch main \
            --commit "$release_commit" \
            --event push \
            --status success \
            --limit 1 \
            --json conclusion \
            --jq '.[0].conclusion // ""')
          if [[ "$ci_conclusion" != "success" ]]; then
            echo "main 提交 $release_commit 没有成功的 CI 记录" >&2
            exit 1
          fi

  build:
    name: ${{ matrix.target }}
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            archive: tar.gz
          - runner: macos-15-intel
            target: x86_64-apple-darwin
            archive: tar.gz
          - runner: macos-15
            target: aarch64-apple-darwin
            archive: tar.gz
          - runner: windows-2025
            target: x86_64-pc-windows-msvc
            archive: zip
          - runner: windows-11-arm
            target: aarch64-pc-windows-msvc
            archive: zip
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ env.RELEASE_REF }}
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}
      - name: 构建发布二进制
        run: cargo build --locked --release --target ${{ matrix.target }}
      - name: 打包 Unix 二进制
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          mkdir staging
          cp "target/${{ matrix.target }}/release/procora" staging/
          tar -C staging -czf "procora-${{ matrix.target }}.tar.gz" procora
          shasum -a 256 "procora-${{ matrix.target }}.tar.gz" > "procora-${{ matrix.target }}.tar.gz.sha256"
      - name: 打包 Windows 二进制
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          New-Item -ItemType Directory staging | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/procora.exe" staging/
          Compress-Archive -Path staging/procora.exe -DestinationPath "procora-${{ matrix.target }}.zip"
          $hash = (Get-FileHash "procora-${{ matrix.target }}.zip" -Algorithm SHA256).Hash.ToLower()
          "$hash  procora-${{ matrix.target }}.zip" | Set-Content "procora-${{ matrix.target }}.zip.sha256"
      - name: 上传构建产物
        id: upload_artifact
        continue-on-error: true
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: procora-${{ matrix.target }}
          path: |
            procora-${{ matrix.target }}.${{ matrix.archive }}
            procora-${{ matrix.target }}.${{ matrix.archive }}.sha256
          if-no-files-found: error
      - name: 等待重试上传
        if: steps.upload_artifact.outcome == 'failure'
        shell: bash
        run: sleep 10
      - name: 重试上传构建产物
        if: steps.upload_artifact.outcome == 'failure'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: procora-${{ matrix.target }}
          path: |
            procora-${{ matrix.target }}.${{ matrix.archive }}
            procora-${{ matrix.target }}.${{ matrix.archive }}.sha256
          if-no-files-found: error
          overwrite: true

  publish:
    name: 发布 GitHub Release
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
          merge-multiple: true
      - uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: artifacts/*
          generate_release_notes: true
          fail_on_unmatched_files: true
