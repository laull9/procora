name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: 要创建或更新的 Release 标签，例如 v0.1.0
        required: true
        type: string

permissions:
  contents: write

jobs:
  verify:
    name: 发布前质量门禁
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt
      - name: 检查格式
        run: cargo fmt --all -- --check
      - name: 运行 Clippy
        run: cargo clippy --locked --workspace --all-targets --all-features -- -D warnings
      - name: 运行测试
        run: cargo test --locked --workspace --all-features

  build:
    name: ${{ matrix.target }}
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            archive: tar.gz
          - runner: macos-15-intel
            target: x86_64-apple-darwin
            archive: tar.gz
          - runner: macos-15
            target: aarch64-apple-darwin
            archive: tar.gz
          - runner: windows-2025
            target: x86_64-pc-windows-msvc
            archive: zip
          - runner: windows-11-arm
            target: aarch64-pc-windows-msvc
            archive: zip
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: 构建发布二进制
        run: cargo build --locked --release --target ${{ matrix.target }} -p procora-cli
      - name: 打包 Unix 二进制
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          mkdir staging
          cp "target/${{ matrix.target }}/release/procora" staging/
          tar -C staging -czf "procora-${{ matrix.target }}.tar.gz" procora
          shasum -a 256 "procora-${{ matrix.target }}.tar.gz" > "procora-${{ matrix.target }}.tar.gz.sha256"
      - name: 打包 Windows 二进制
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          New-Item -ItemType Directory staging | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/procora.exe" staging/
          Compress-Archive -Path staging/procora.exe -DestinationPath "procora-${{ matrix.target }}.zip"
          $hash = (Get-FileHash "procora-${{ matrix.target }}.zip" -Algorithm SHA256).Hash.ToLower()
          "$hash  procora-${{ matrix.target }}.zip" | Set-Content "procora-${{ matrix.target }}.zip.sha256"
      - uses: actions/upload-artifact@v4
        with:
          name: procora-${{ matrix.target }}
          path: |
            procora-${{ matrix.target }}.${{ matrix.archive }}
            procora-${{ matrix.target }}.${{ matrix.archive }}.sha256
          if-no-files-found: error

  publish:
    name: 发布 GitHub Release
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'push' && github.ref_name || inputs.tag }}
          files: artifacts/*
          generate_release_notes: true
          fail_on_unmatched_files: true
