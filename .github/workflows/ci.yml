name: ci

on:
  push:
    branches:
      - dev
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: 格式、静态检查与测试
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable
          components: clippy,rustfmt
      - name: 检查格式
        run: cargo fmt --all -- --check
      - name: 运行 Clippy
        run: cargo clippy --locked --all-targets --all-features -- -D warnings
      - name: 运行测试
        run: cargo test --locked --all-features
      - name: 单独验证 Linux systemd feature 与权限失败契约
        run: cargo test --locked --no-default-features --features systemd --test platform
      - name: 检查公共文档
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --locked --no-deps --all-features

  msrv:
    name: 最低 Rust 1.95
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: 1.95.0
      - name: 校验最低版本可编译全部目标
        run: cargo check --locked --all-targets --all-features

  dependency-policy:
    name: 许可证、版本与来源策略
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: EmbarkStudios/cargo-deny-action@3c6349835b2b7b196a839186cb8b78e02f7b5f25 # v2
        with:
          command: check bans licenses sources
          arguments: --locked --all-features

  rustsec:
    name: RustSec 漏洞审计
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      checks: write
      issues: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: rustsec/audit-check@858dc40f52ca2b8570b7a997c1c4e35c6fc9a432 # master, Node 24
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  windows-tests:
    name: Windows x86_64 测试
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable
      - name: 运行 Windows 测试
        run: cargo test --locked
